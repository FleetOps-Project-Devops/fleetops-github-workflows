name: Reusable FleetOps CD - Dev

concurrency:
  group: fleetops-cd-dev-${{ inputs.service-name }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name matching chart directory (e.g., auth-service)"
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true

jobs:
  update-dev:
    name: update-dev-${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve dev image tag
        id: resolve-tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::7}"
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Resolved dev image tag: ${TAG}"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "fleetops-deployments"

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      - name: Update image tag in values-dev.yaml
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service-name }}"
          TAG="${{ steps.resolve-tag.outputs.image-tag }}"
          VALUES_FILE="manifest-repo/charts/${SERVICE}/values-dev.yaml"

          if [[ ! -f "${VALUES_FILE}" ]]; then
            echo "Error: Values file not found: ${VALUES_FILE}"
            exit 1
          fi

          yq e ".image.tag = \"${TAG}\"" -i "${VALUES_FILE}"

          echo "Updated image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      - name: Commit and push to manifest repo
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service-name }}"
          TAG="${{ steps.resolve-tag.outputs.image-tag }}"
          MSG="chore(${SERVICE}): bump dev image tag to ${TAG} [skip ci]"

          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "charts/${SERVICE}/values-dev.yaml"
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "${MSG}"
          git push
