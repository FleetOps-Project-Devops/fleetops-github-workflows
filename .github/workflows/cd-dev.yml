name: Reusable FleetOps CD - Dev

concurrency:
  group: fleetops-cd-dev-${{ inputs.service-name }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name matching chart directory (e.g., auth-service)"
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true
      SMTP_HOST:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      EMAIL_TO:
        required: false

jobs:
  update-dev:
    name: update-dev-${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve dev image tag
        id: resolve-tag
        run: |
          set -euo pipefail
          TAG="develop-${GITHUB_SHA::7}"
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Resolved dev image tag: ${TAG}"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "fleetops-deployments"

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      - name: Update image tag in values-dev.yaml
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service-name }}"
          TAG="${{ steps.resolve-tag.outputs.image-tag }}"
          VALUES_FILE="manifest-repo/charts/${SERVICE}/values-dev.yaml"

          if [[ ! -f "${VALUES_FILE}" ]]; then
            echo "Error: Values file not found: ${VALUES_FILE}"
            exit 1
          fi

          yq e ".image.tag = \"${TAG}\"" -i "${VALUES_FILE}"

          echo "Updated image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      - name: Commit and push to manifest repo
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service-name }}"
          TAG="${{ steps.resolve-tag.outputs.image-tag }}"
          MSG="chore(${SERVICE}): bump dev image tag to ${TAG} [skip ci]"

          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "charts/${SERVICE}/values-dev.yaml"
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "${MSG}"
          git push

  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [update-dev]
    if: always()

    steps:
      - name: Send Email (Success)
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CD Success (Dev) - ${{ inputs.service-name }}"
          body: |
            Deployment to Dev Environment Successful

            Service:      ${{ inputs.service-name }}
            Repository:   ${{ github.repository }}
            Triggered By: ${{ github.actor }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CD Failed (Dev) - ${{ inputs.service-name }} - Run #${{ github.run_number }}"
          body: |
            CD Pipeline Execution Failed for Dev Environment

            Service:       ${{ inputs.service-name }}
            Repository:    ${{ github.repository }}
            Triggered By:  ${{ github.actor }}
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
