name: Reusable FleetOps CD

concurrency:
  group: fleetops-cd-${{ inputs.service-name }}-${{ inputs.deploy-env }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name matching chart directory (e.g., auth-service)"
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"
      deploy-env:
        required: true
        type: string
        description: "Deployment environment: dev or prod"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true

jobs:
  prepare:
    name: prepare-${{ inputs.service-name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image-tag: ${{ steps.resolve-tag.outputs.image-tag }}
      values-file: ${{ steps.resolve-tag.outputs.values-file }}
      commit-message: ${{ steps.resolve-tag.outputs.commit-message }}
    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag strategy
        id: resolve-tag
        run: |
          set -euo pipefail
          
          SERVICE="${{ inputs.service-name }}"
          ENV="${{ inputs.deploy-env }}"
          
          if [[ "${ENV}" == "dev" ]]; then
            # Dev: use short commit SHA
            TAG="${GITHUB_SHA::7}"
            VALUES_FILE="charts/${SERVICE}/values-dev.yaml"
            COMMIT_MSG="chore(${SERVICE}): bump dev image tag to ${TAG} [skip ci]"
          elif [[ "${ENV}" == "prod" ]]; then
            # Prod: use latest SemVer tag
            git fetch --tags --force
            TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || echo 'v1.0.0')"
            if [[ -z "${TAG}" ]]; then
              echo "No SemVer tags found, defaulting to v1.0.0"
              TAG="v1.0.0"
            fi
            VALUES_FILE="charts/${SERVICE}/values-prod.yaml"
            COMMIT_MSG="release(${SERVICE}): bump prod image tag to ${TAG} [skip ci]"
          else
            echo "Invalid deploy-env: ${ENV}. Must be 'dev' or 'prod'"
            exit 1
          fi
          
          echo "image-tag=${TAG}" >> $GITHUB_OUTPUT
          echo "values-file=${VALUES_FILE}" >> $GITHUB_OUTPUT
          echo "commit-message=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          
          echo "Resolved image tag: ${TAG}"
          echo "Values file: ${VALUES_FILE}"
          echo "Commit message: ${COMMIT_MSG}"

  update-dev:
    name: update-dev-${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ inputs.deploy-env == 'dev' }}
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "fleetops-deployments"

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      - name: Update image tag in values-dev.yaml
        run: |
          set -euo pipefail
          
          TAG="${{ needs.prepare.outputs.image-tag }}"
          VALUES_FILE="manifest-repo/${{ needs.prepare.outputs.values-file }}"
          
          if [[ ! -f "${VALUES_FILE}" ]]; then
            echo "Error: Values file not found: ${VALUES_FILE}"
            exit 1
          fi
          
          yq e ".image.tag = \"${TAG}\"" -i "${VALUES_FILE}"
          
          echo "Updated image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      - name: Commit and push to manifest repo
        run: |
          set -euo pipefail
          
          SERVICE="${{ inputs.service-name }}"
          MSG="${{ needs.prepare.outputs.commit-message }}"
          
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "${{ needs.prepare.outputs.values-file }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "${MSG}"
          git push

  update-prod:
    name: update-prod-${{ inputs.service-name }}
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ inputs.deploy-env == 'prod' }}
    environment: production
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "fleetops-deployments"

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      - name: Update image tag in values-prod.yaml
        run: |
          set -euo pipefail
          
          TAG="${{ needs.prepare.outputs.image-tag }}"
          VALUES_FILE="manifest-repo/${{ needs.prepare.outputs.values-file }}"
          
          if [[ ! -f "${VALUES_FILE}" ]]; then
            echo "Error: Values file not found: ${VALUES_FILE}"
            exit 1
          fi
          
          yq e ".image.tag = \"${TAG}\"" -i "${VALUES_FILE}"
          
          echo "Updated image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      - name: Commit and push to manifest repo
        run: |
          set -euo pipefail
          
          SERVICE="${{ inputs.service-name }}"
          MSG="${{ needs.prepare.outputs.commit-message }}"
          
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "${{ needs.prepare.outputs.values-file }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "${MSG}"
          git push
