name: Reusable Java CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: "21"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      image_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      run_sonar:
        required: false
        type: boolean
        default: true
      run_snyk:
        required: false
        type: boolean
        default: true
      push_image:
        required: false
        type: boolean
        default: false
      image_tags:
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  ci:
    name: java-ci-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
    concurrency:
      group: java-ci-${{ inputs.service_name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven

      - name: Build and unit test
        run: mvn -B clean verify

      - name: SonarQube scan
        if: ${{ inputs.run_sonar }}
        uses: SonarSource/sonarqube-scan-action@v3.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}

      - name: Install Snyk CLI
        if: ${{ inputs.run_snyk }}
        run: |
          curl -sSL https://static.snyk.io/cli/latest/snyk-linux -o snyk
          chmod +x snyk
          sudo mv snyk /usr/local/bin/snyk

      - name: Snyk OSS scan (high/critical fail)
        if: ${{ inputs.run_snyk }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "$SNYK_TOKEN"
          snyk test --severity-threshold=high --file=pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare Docker tags
        id: prep_tags
        shell: bash
        run: |
          if [[ -z "${{ inputs.image_tags }}" ]]; then
            if [[ "${{ inputs.push_image }}" == "true" && "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "develop" ]]; then
              echo "tags<<EOF" >> "$GITHUB_OUTPUT"
              echo "${{ inputs.image_name }}:develop-latest" >> "$GITHUB_OUTPUT"
              echo "${{ inputs.image_name }}:develop-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
              echo "primary_tag=develop-latest" >> "$GITHUB_OUTPUT"
            else
              echo "tags=${{ inputs.image_name }}:ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "primary_tag=ci-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            fi
          else
            IFS=',' read -ra TAGS <<< "${{ inputs.image_tags }}"
            OUT=""
            PRIMARY=""
            for tag in "${TAGS[@]}"; do
              clean_tag="$(echo "$tag" | xargs)"
              if [[ -n "$clean_tag" ]]; then
                OUT+="${{ inputs.image_name }}:${clean_tag}"$'\n'
                if [[ -z "$PRIMARY" ]]; then
                  PRIMARY="$clean_tag"
                fi
              fi
            done
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "$OUT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "primary_tag=$PRIMARY" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker build (local image for validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: false
          tags: ${{ inputs.image_name }}:${{ steps.prep_tags.outputs.primary_tag }}
          provenance: false
          sbom: false
          load: true

      - name: Trivy image scan (high/critical fail)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ inputs.image_name }}:${{ steps.prep_tags.outputs.primary_tag }}
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Determine semantic version (main only)
        id: semver
        if: ${{ inputs.push_image && github.event_name == 'push' && github.ref_name == 'main' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${LAST_TAG}" ]]; then
            echo "version=v1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMITS="$(git log "${LAST_TAG}"..HEAD --pretty=%B || true)"
          BUMP="patch"
          if echo "$COMMITS" | grep -Eq 'BREAKING CHANGE|!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -Eiq '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -Eiq '^fix(\(.+\))?:'; then
            BUMP="patch"
          fi

          BASE="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            major)
              MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
              ;;
            minor)
              MINOR=$((MINOR+1)); PATCH=0
              ;;
            *)
              PATCH=$((PATCH+1))
              ;;
          esac

          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub release (main only)
        if: ${{ inputs.push_image && github.event_name == 'push' && github.ref_name == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
          gh release view "$VERSION" >/dev/null 2>&1 || \
            gh release create "$VERSION" --title "$VERSION" --notes "Automated semantic release for $VERSION"

      - name: Compute final Docker tags
        id: final_tags
        shell: bash
        run: |
          if [[ "${{ inputs.push_image }}" != "true" ]]; then
            echo "tags=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_name }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.image_name }}:${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ steps.prep_tags.outputs.tags }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker push (develop/main)
        if: ${{ inputs.push_image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.final_tags.outputs.tags }}
          provenance: false
          sbom: false
