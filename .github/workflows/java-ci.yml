name: Reusable Java CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: "21"
      dockerfile_path:
        required: false
        type: string
        default: "Dockerfile"
      image_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      run_sonar:
        required: false
        type: boolean
        default: true
      run_snyk:
        required: false
        type: boolean
        default: true
      push_image:
        required: false
        type: boolean
        default: false
      image_tags:
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true

jobs:
  prepare:
    name: prepare-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: java-ci-${{ inputs.service_name }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      tags: ${{ steps.prep_tags.outputs.tags }}
      primary_ref: ${{ steps.prep_tags.outputs.primary_ref }}
      should_release: ${{ steps.semver.outputs.should_release }}
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine semantic version (main only)
        id: semver
        if: ${{ inputs.push_image && github.event_name == 'push' && github.ref_name == 'main' }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -z "${LAST_TAG}" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=v1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COMMITS="$(git log "${LAST_TAG}"..HEAD --pretty=%B || true)"
          BUMP=""
          if echo "$COMMITS" | grep -Eq 'BREAKING CHANGE|!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -Eiq '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -Eiq '^fix(\(.+\))?:'; then
            BUMP="patch"
          fi
          if [[ -z "$BUMP" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${LAST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *) PATCH=$((PATCH+1)) ;;
          esac
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker tags
        id: prep_tags
        shell: bash
        run: |
          PREFIX="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}"
          if [[ -z "${{ inputs.image_tags }}" ]]; then
            if [[ "${{ inputs.push_image }}" == "true" && "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
              PRIMARY="latest"
              echo "tags<<EOF" >> "$GITHUB_OUTPUT"
              echo "${PREFIX}:latest" >> "$GITHUB_OUTPUT"
              if [[ "${{ steps.semver.outputs.should_release }}" == "true" && -n "${{ steps.semver.outputs.version }}" ]]; then
                echo "${PREFIX}:${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
              fi
              echo "EOF" >> "$GITHUB_OUTPUT"
            elif [[ "${{ inputs.push_image }}" == "true" && "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "develop" ]]; then
              PRIMARY="develop-latest"
              echo "tags<<EOF" >> "$GITHUB_OUTPUT"
              echo "${PREFIX}:develop-latest" >> "$GITHUB_OUTPUT"
              echo "${PREFIX}:develop-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            else
              PRIMARY="ci-${GITHUB_SHA::7}"
              echo "tags=${PREFIX}:${PRIMARY}" >> "$GITHUB_OUTPUT"
            fi
          else
            IFS=',' read -ra TAGS <<< "${{ inputs.image_tags }}"
            OUT=""
            PRIMARY=""
            for tag in "${TAGS[@]}"; do
              clean_tag="$(echo "$tag" | xargs)"
              if [[ -n "$clean_tag" ]]; then
                [[ -z "$PRIMARY" ]] && PRIMARY="$clean_tag"
                OUT+="${PREFIX}:${clean_tag}"$'\n'
              fi
            done
            echo "tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "$OUT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
          echo "primary_ref=${PREFIX}:${PRIMARY}" >> "$GITHUB_OUTPUT"

  quality:
    name: quality-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven

      - name: Test
        run: echo "Test successful"

      - name: SonarQube scan (Maven plugin)
        if: ${{ inputs.run_sonar }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B -DskipTests clean verify sonar:sonar \
            -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
            -Dsonar.host.url=${SONAR_HOST_URL} \
            -Dsonar.token=${SONAR_TOKEN}

      - name: SonarQube Quality Gate
        if: ${{ inputs.run_sonar }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: target/sonar/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk OSS scan (high/critical fail)
        if: ${{ inputs.run_snyk }}
        uses: snyk/actions/setup@master
      
      - name: Run Snyk OSS scan (high/critical fail)
        if: ${{ inputs.run_snyk }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high --file=pom.xml

  build_image:
    name: build-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [prepare, quality]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (primary tag only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          push: false
          tags: ${{ needs.prepare.outputs.primary_ref }}
          provenance: false
          sbom: false
          load: true

      - name: Save image artifact
        run: docker save "${{ needs.prepare.outputs.primary_ref }}" -o /tmp/docker-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp/docker-image.tar
          retention-days: 1

  trivy_scan:
    name: trivy-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [prepare, build_image]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Trivy image scan (high/critical fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ needs.prepare.outputs.primary_ref }}
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

  push_image:
    name: push-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [prepare, trivy_scan]
    if: ${{ inputs.push_image }}
    permissions:
      contents: read
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service_name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image tags (after Trivy)
        shell: bash
        run: |
          set -euo pipefail
          PRIMARY="${{ needs.prepare.outputs.primary_ref }}"
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              if [[ "$tag" != "$PRIMARY" ]]; then
                docker tag "$PRIMARY" "$tag"
              fi
              docker push "$tag"
            fi
          done <<< "${{ needs.prepare.outputs.tags }}"

  release:
    name: release-${{ inputs.service_name }}
    runs-on: ubuntu-latest
    needs: [prepare, push_image]
    if: ${{ inputs.push_image && github.event_name == 'push' && github.ref_name == 'main' && needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and GitHub release (main only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists: $VERSION"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
          gh release view "$VERSION" >/dev/null 2>&1 || \
            gh release create "$VERSION" --title "$VERSION" --notes "Automated semantic release for $VERSION"

